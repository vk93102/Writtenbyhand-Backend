name: CI-CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (critical checks)
        run: ruff check . --select E9,F63,F7,F82

      - name: Create minimal .env for CI tests
        run: |
          echo "DJANGO_SETTINGS_MODULE=handtotext_ai.settings" > .env

      - name: Make test scripts executable
        run: chmod +x tests/*.sh

      - name: Run CI test pipeline
        run: ./tests/ci_pipeline.sh

  container-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t handtotext-backend:ci .

  cd:
    needs: [ci, container-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deploy (if hook is configured)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          chmod +x tests/trigger_render_deploy.sh
          ./tests/trigger_render_deploy.sh
